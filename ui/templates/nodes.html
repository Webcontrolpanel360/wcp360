<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>Nodes Management - WCP360</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-10">
    <h1 class="text-3xl font-bold mb-8">Multi-Server Infrastructure</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="nodes-grid">
        <div class="bg-slate-800 p-6 rounded-2xl border border-blue-500/50 shadow-lg shadow-blue-500/10">
            <div class="flex justify-between items-start mb-4">
                <span class="bg-blue-500 text-[10px] font-bold px-2 py-1 rounded">MASTER</span>
                <span class="text-green-400 text-xs">● Online</span>
            </div>
            <h2 class="text-xl font-bold">Localhost</h2>
            <p class="text-slate-400 text-sm">127.0.0.1</p>
            <div class="mt-6 space-y-2">
                <div class="flex justify-between text-xs"><span>CPU</span><span>12%</span></div>
                <div class="w-full bg-slate-700 h-1 rounded-full"><div class="bg-blue-500 h-1 w-[12%]"></div></div>
            </div>
        </div>

        <button class="border-2 border-dashed border-slate-700 rounded-2xl flex flex-col items-center justify-center p-6 hover:border-blue-500 hover:bg-slate-800/50 transition-all group">
            <span class="text-4xl text-slate-700 group-hover:text-blue-500 transition">+</span>
            <span class="text-slate-500 group-hover:text-slate-300">Add Remote Node</span>
        </button>
    </div>
</body>
</html>
